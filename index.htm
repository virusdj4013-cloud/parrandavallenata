<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Live | AC MEDIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff6b00;
            --fixed-front-art: url('https://blogger.googleusercontent.com/img/a/AVvXsEjLLyZ708LW-OuIZB6E1XtTjXRmTjNYhyFwDwetpY5i8QvtiJMFReZ2PvJzAwUPFcfonQNr3R2p00eWfDrgLcwSoSLeDkLelQlOwV7yPcQbxrNPOQG0Osr8l9ya3urHEcy6M6RtQgun7TzY1qwL5dir8mTMqxVyXw2E7LtcZscjrY1yDdxsWShSaVAfEYQ=s1350');
            --default-bg: url('https://blogger.googleusercontent.com/img/a/AVvXsEjLLyZ708LW-OuIZB6E1XtTjXRmTjNYhyFwDwetpY5i8QvtiJMFReZ2PvJzAwUPFcfonQNr3R2p00eWfDrgLcwSoSLeDkLelQlOwV7yPcQbxrNPOQG0Osr8l9ya3urHEcy6M6RtQgun7TzY1qwL5dir8mTMqxVyXw2E7LtcZscjrY1yDdxsWShSaVAfEYQ=s1350');
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: white;
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        #bgBlur {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; background-size: cover; background-position: center;
            background-image: var(--default-bg);
            filter: blur(5px) brightness(1.0);
            transition: background-image 2s ease-in-out;
            transform: scale(1.1);
        }

        .gradient-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.95) 100%);
        }

        .main-view {
            position: relative; z-index: 5;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 15px; box-sizing: border-box;
        }

        /* LOGO GRANDE EN MÓVILES */
        .art-box-fixed {
            width: 900vw; height: 90vw; /* Ocupa casi todo el ancho en móviles */
            max-width: 420px; max-height: 420px; /* Tamaño máximo para tablets/PC */
            margin-bottom: 25px;
            border-radius: 45px; overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            border: 2px solid rgba(255,107,0,0.4);
            background-image: var(--fixed-front-art);
            background-size: cover; background-position: center;
            transition: transform 0.1s ease-out;
        }

        /* BARRA DE INFORMACIÓN COMPACTA */
        .metadata-bar {
            width: 100%; max-width: 480px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            padding: 15px 20px; border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex; align-items: center; gap: 15px;
            box-sizing: border-box;
        }

        .info { flex: 1; min-width: 0; overflow: hidden; }

        .live-status {
            color: var(--primary-orange); font-size: 8px;
            font-weight: 900; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 3px;
            display: flex; align-items: center; gap: 5px;
        }

        .dot { width: 7px; height: 7px; background: var(--primary-orange); border-radius: 50%; animation: pulse-dot 1.5s infinite; }

        /* SCROLL DINÁMICO */
        .scroll-wrapper { overflow: hidden; white-space: nowrap; width: 100%; }
        .scroll-content { display: inline-block; white-space: nowrap; }
        .is-scrolling { animation: marquee 12s linear infinite; padding-left: 100%; }

        #songTitle { font-size: clamp(1.1rem, 5vw, 1.3rem); font-weight: 800; margin: 0; color: #fff; }
        #songArtist { font-size: clamp(0.9rem, 4vw, 1rem); opacity: 0.6; margin: 1px 0 0; }

        .play-btn {
            background: var(--primary-orange); border: none;
            width: 60px; height: 60px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s active; flex-shrink: 0;
            box-shadow: 0 10px 20px rgba(255,107,0,0.3);
        }
        .play-btn svg { width: 26px; fill: black; }
        .play-btn:active { transform: scale(0.9); }

        footer { position: fixed; bottom: 0; width: 100%; padding: 12px 0; text-align: center; z-index: 10; }
        .copyright { font-size: 10px; color: rgba(255, 255, 255, 0.3); letter-spacing: 1px; }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @keyframes pulse-dot { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.6); opacity: 0.3; } 100% { transform: scale(1); opacity: 1; } }

        /* Ajuste para pantallas muy pequeñas (iPhone SE, etc) */
        @media (max-height: 650px) {
            .art-box-fixed { width: 75vw; height: 75vw; margin-bottom: 15px; }
            .metadata-bar { padding: 12px 18px; }
        }
    </style>
</head>
<body>

    <div id="bgBlur"></div>
    <div class="gradient-overlay"></div>

    <div class="main-view">
        <div class="art-box-fixed" id="artVisual"></div>

        <div class="metadata-bar">
            <div class="info">
                <div class="live-status"><span class="dot"></span> En Vivo</div>
                
                <div class="scroll-wrapper" id="titleWrapper">
                    <div class="scroll-content" id="titleContent">
                        <h2 id="songTitle">Sintonizando...</h2>
                    </div>
                </div>

                <div class="scroll-wrapper" id="artistWrapper">
                    <div class="scroll-content" id="artistContent">
                        <p id="songArtist">AC MEDIA Radio</p>
                    </div>
                </div>
            </div>
            
            <button class="play-btn" id="playToggle">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>
    </div>

    <footer>
        <div class="copyright">&copy; 2026 <b>AC MEDIA</b>.</div>
    </footer>

    <audio id="radioStream" crossorigin="anonymous" src="https://a7.asurahosting.com:6640/radio.mp3"></audio>

    <script>
        const API_AZURA = 'https://a7.asurahosting.com/api/nowplaying_static/parranda_vallenata_web_.json';
        const DEFAULT_BG = 'https://blogger.googleusercontent.com/img/a/AVvXsEjLLyZ708LW-OuIZB6E1XtTjXRmTjNYhyFwDwetpY5i8QvtiJMFReZ2PvJzAwUPFcfonQNr3R2p00eWfDrgLcwSoSLeDkLelQlOwV7yPcQbxrNPOQG0Osr8l9ya3urHEcy6M6RtQgun7TzY1qwL5dir8mTMqxVyXw2E7LtcZscjrY1yDdxsWShSaVAfEYQ=s1350';
        
        const audio = document.getElementById('radioStream');
        const playBtn = document.getElementById('playToggle');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const bgBlur = document.getElementById('bgBlur');
        const artVisual = document.getElementById('artVisual');

        let currentTrackId = "";

        function checkScroll() {
            const elements = [
                { wrapper: 'titleWrapper', content: 'titleContent' },
                { wrapper: 'artistWrapper', content: 'artistContent' }
            ];
            elements.forEach(el => {
                const wrap = document.getElementById(el.wrapper);
                const cont = document.getElementById(el.content);
                if (cont.scrollWidth > (wrap.offsetWidth + 2)) {
                    cont.classList.add('is-scrolling');
                } else {
                    cont.classList.remove('is-scrolling');
                }
            });
        }

        async function getiTunesArt(term) {
            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&media=music&limit=1`);
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    return data.results[0].artworkUrl100.replace('100x100bb', '1000x1000bb');
                }
            } catch (e) {}
            return null;
        }

        async function fetchMetadata() {
            try {
                const response = await fetch(API_AZURA);
                const data = await response.json();
                const np = Array.isArray(data) ? data[0].now_playing : data.now_playing;
                
                if (currentTrackId !== (np.song.title + np.song.artist)) {
                    currentTrackId = np.song.title + np.song.artist;
                    document.getElementById('songTitle').textContent = np.song.title;
                    document.getElementById('songArtist').textContent = np.song.artist;

                    const art = await getiTunesArt(`${np.song.artist} ${np.song.title}`);
                    bgBlur.style.backgroundImage = `url('${art || DEFAULT_BG}')`;
                    setTimeout(checkScroll, 800);
                }
            } catch (error) {}
        }

        window.addEventListener('resize', checkScroll);
        setInterval(fetchMetadata, 10000);
        fetchMetadata();

        let audioCtx, analyser, dataArray;
        function initVisualizer() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                loop();
            }
        }

        function loop() {
            requestAnimationFrame(loop);
            if (!audio.paused) {
                analyser.getByteFrequencyData(dataArray);
                let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;
                let scale = 1 + (volume / 255) * 0.12; 
                artVisual.style.transform = `scale(${scale})`;
            }
        }

        playBtn.addEventListener('click', () => {
            initVisualizer();
            if (audio.paused) {
                audio.play();
                playIcon.style.display = 'none'; pauseIcon.style.display = 'block';
            } else {
                audio.pause();
                playIcon.style.display = 'block'; pauseIcon.style.display = 'none';
                artVisual.style.transform = `scale(1)`;
            }
        });
    </script>
</body>
</html>
